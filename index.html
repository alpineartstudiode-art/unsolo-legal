<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnSolo — Download</title>
    <meta name="description" content="UnSolo — find travel and sport buddies. Download for iOS and Android.">
    <style>
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.6;
            color: #e2e8f0;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(160deg, #1a1d26 0%, #0f172a 45%, #1e293b 100%);
        }
        .wrap {
            max-width: 520px;
            margin: 0 auto;
            padding: 48px 24px 64px;
            text-align: center;
        }
        .logo {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0 0 8px;
            background: linear-gradient(90deg, #f472b6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline {
            color: #94a3b8;
            font-size: 1.05rem;
            margin: 0 0 40px;
        }
        .card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px 24px;
            margin-bottom: 32px;
            backdrop-filter: blur(8px);
        }
        .card h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f1f5f9;
            margin: 0 0 12px;
        }
        .card p {
            color: #94a3b8;
            font-size: 0.95rem;
            margin: 0 0 24px;
        }
        .stores {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: stretch;
        }
        .store-btn {
            display: block;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #64748b;
            background: rgba(255, 255, 255, 0.04);
            cursor: default;
        }
        .store-btn.soon::after {
            content: " — coming soon";
            font-weight: 400;
            font-size: 0.85rem;
        }
        .links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 16px;
            font-size: 0.875rem;
        }
        .links a {
            color: #93c5fd;
            text-decoration: none;
        }
        .links a:hover { text-decoration: underline; }
        footer {
            margin-top: 48px;
            font-size: 0.75rem;
            color: #64748b;
        }
        footer a { color: #94a3b8; }
        @media (min-width: 480px) {
            .stores { flex-direction: row; justify-content: center; }
            .store-btn { flex: 1; max-width: 200px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <p class="logo">UnSolo</p>
        <p class="tagline">Any season, anywhere — with someone who shares your passion.</p>

        <div class="card">
            <h1>Download UnSolo</h1>
            <p>The app is coming soon to the App Store and Google Play. Check back here for store links after launch.</p>
            <div class="stores">
                <span class="store-btn soon" aria-disabled="true">App Store</span>
                <span class="store-btn soon" aria-disabled="true">Google Play</span>
            </div>
        </div>

        <nav class="links" aria-label="Legal">
            <a href="/unsolo/legal/privacy.html">Privacy</a>
            <a href="/unsolo/legal/terms.html">Terms</a>
            <a href="/unsolo/legal/community-guidelines.html">Community Guidelines</a>
        </nav>

        <footer>
            &copy; 2026 <a href="https://alpineart.de/">AlpineArtStudio</a>. UnSolo.
        </footer>
    </div>
</body>
</html>
