<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnSolo Support</title>
    <meta name="description" content="Contact UnSolo support for help with the Travel &amp; Sport Buddies app.">
    <meta name="theme-color" content="#1A1D26">
    <link rel="icon" href="../download/assets/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: #1A1D26;
            color: #F3ECE3;
            font-family: 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 300;
            -webkit-font-smoothing: antialiased;
        }
        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px 32px;
            text-align: center;
            max-width: 560px;
            margin: 0 auto;
            width: 100%;
        }
        .headline {
            margin: 0 0 24px;
            font-size: 36px;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }
        .contact {
            margin: 0;
            max-width: 520px;
            font-size: 20px;
            font-weight: 300;
            line-height: 1.65;
            opacity: 0.92;
        }
        .contact a {
            color: #F3ECE3;
            font-weight: 400;
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .contact a:hover {
            opacity: 0.85;
        }
        .site-footer {
            margin-top: auto;
            padding: 20px 16px 28px;
            text-align: center;
        }
        .back-link {
            font-size: 13px;
            font-weight: 400;
            color: #9C9A97;
            text-decoration: none;
        }
        .back-link:hover {
            color: #F3ECE3;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="page">
        <main class="main">
            <h1 class="headline">UnSolo Support</h1>
            <p class="contact">
                Need help or have a question? Contact us at
                <a href="mailto:unsolo.box@gmail.com">unsolo.box@gmail.com</a>.
            </p>
        </main>
        <footer class="site-footer">
            <a class="back-link" href="../download/">Download UnSolo</a>
        </footer>
    </div>
</body>
</html>
